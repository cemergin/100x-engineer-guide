# =============================================================================
# The 100x Engineer Course — Complete Course Outline
# =============================================================================
# ~90 modules across 3 spiral loops
# Running example: TicketPulse (concert ticketing platform)
# Each module: 45-90 minutes of interactive reading + hands-on
#
# Tiers:
#   🟢 Core       — everyone completes these
#   🟡 Deep Dive  — for those who want more depth
#   🔴 Expert     — staff+ level material
#
# Exercise types:
#   🤔 Reflect  🔍 Explore  🛠️ Build  🐛 Debug
#   📐 Design   💡 Insight  🚀 Deploy  📊 Observe
#
# TicketPulse evolution:
#   Loop 1: Simple monolith with basic features
#   Loop 2: Microservices with real infrastructure
#   Loop 3: Global, real-time, intelligent platform
# =============================================================================

course:
  title: "The 100x Engineer Course"
  version: "1.0"
  running_example: "TicketPulse — a concert ticketing platform"
  total_modules: 97
  estimated_hours: "97-145 hours"
  loops:
    - name: "Foundation — Build the Mental Model"
      modules: "L1-M01 through L1-M30"
    - name: "Practice — Scale and Break Things"
      modules: "L2-M31 through L2-M60"
    - name: "Mastery — Design for the Real World"
      modules: "L3-M61 through L3-M90"

# =============================================================================
# LOOP 1: FOUNDATION — BUILD THE MENTAL MODEL (Modules 01-30)
# =============================================================================
# Theme: "Understand what exists and why"
# TicketPulse state: Simple monolith -> basic features working
# Scaffolding: Heavy (starter code, guided steps, generous hints)
# =============================================================================

modules:

  # ---------------------------------------------------------------------------
  # Section 1A: The Starting Line (Modules 01-04)
  # ---------------------------------------------------------------------------

  - id: L1-M01
    title: "Course Setup & TicketPulse Kickoff"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: []
    ticketpulse: "Clone the monolith repo, run docker compose up, see the app serving events and tickets in the browser for the first time."
    summary: "Clone the TicketPulse repo, start the full stack locally with Docker Compose, and explore the codebase structure to build a mental map of the project."
    exercises:
      - type: "🚀 Deploy"
        description: "Clone the TicketPulse repository, run docker compose up, and verify the app is running at localhost:3000."
      - type: "🔍 Explore"
        description: "Walk through the directory structure — identify where routes, models, migrations, and config live. Draw a quick map of the codebase."
      - type: "🤔 Reflect"
        description: "Read the README and identify three things you don't understand yet. Write them down — you'll revisit them later."
    runs_locally: true
    prereqs: []

  - id: L1-M02
    title: "Your Dev Environment"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [12]
    ticketpulse: "Your local dev setup is now optimized for working on TicketPulse — fast file search, fuzzy history, and a configured editor."
    summary: "Set up a modern terminal with zsh, fzf, and ripgrep, configure your editor with essential extensions, and establish your git identity."
    exercises:
      - type: "🔍 Explore"
        description: "Install fzf, ripgrep, bat, and eza. Search the TicketPulse codebase with rg and feel the speed difference over grep."
      - type: "🛠️ Build"
        description: "Configure your .zshrc with useful aliases, set up VS Code (or Vim) with language server support, and configure git with your name, email, and default branch."
      - type: "🤔 Reflect"
        description: "Time yourself finding a function definition with your old tools vs your new tools. Note the difference."
    runs_locally: true
    prereqs: []

  - id: L1-M03
    title: "Git Beyond the Basics"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [12]
    ticketpulse: "You can now confidently manage TicketPulse's git history — rewriting, recovering, and bisecting when things go wrong."
    summary: "Master interactive rebase, git bisect, and reflog by intentionally breaking and recovering the TicketPulse repo."
    exercises:
      - type: "🔍 Explore"
        description: "Use interactive rebase to squash three messy commits into one clean commit. Reorder commits. Drop a commit."
      - type: "🐛 Debug"
        description: "A pre-planted bug exists in the TicketPulse history. Use git bisect to find the exact commit that introduced it."
      - type: "🛠️ Build"
        description: "Intentionally force-push the wrong branch, then use git reflog to recover the lost commits."
    runs_locally: true
    prereqs: [L1-M01]

  - id: L1-M04
    title: "How the Internet Actually Works"
    tier: "🟢 Core"
    duration: "75 min"
    source_chapters: [21]
    ticketpulse: "You now understand every hop a request takes from a user's browser to TicketPulse's server and back."
    summary: "Trace a complete HTTP request from browser to server and back, inspecting DNS, TCP, TLS, and HTTP headers along the way."
    exercises:
      - type: "🔍 Explore"
        description: "Run curl -v against the TicketPulse API. Read every header line. Identify the status code, content type, cache headers, and cookies."
      - type: "🔍 Explore"
        description: "Use tcpdump or Wireshark to capture a TicketPulse request at the packet level. Identify the TCP handshake, HTTP request, and response."
      - type: "🤔 Reflect"
        description: "Draw the full lifecycle of a request: DNS resolution, TCP connect, TLS handshake (if applicable), HTTP request, server processing, HTTP response. Label the time each phase takes."
    runs_locally: true
    prereqs: []

  # ---------------------------------------------------------------------------
  # Section 1B: Data Foundations (Modules 05-10)
  # ---------------------------------------------------------------------------

  - id: L1-M05
    title: "PostgreSQL From Zero"
    tier: "🟢 Core"
    duration: "75 min"
    source_chapters: [2, 24]
    ticketpulse: "TicketPulse now has a proper relational schema — events, venues, tickets, and users tables with constraints and relationships."
    summary: "Design the core TicketPulse database schema, write fundamental queries, and learn to read EXPLAIN output."
    exercises:
      - type: "🛠️ Build"
        description: "Design and create the events, venues, tickets, and users tables with proper types, constraints, foreign keys, and NOT NULL where appropriate."
      - type: "🔍 Explore"
        description: "Use db-fiddle.com or psql to write SELECT, INSERT, UPDATE, DELETE queries against your schema. Practice WHERE, ORDER BY, LIMIT."
      - type: "🔍 Explore"
        description: "Run EXPLAIN on a query that fetches all tickets for an event. Read the output — identify Seq Scan vs Index Scan, estimated rows, and cost."
    runs_locally: true
    prereqs: [L1-M01]

  - id: L1-M06
    title: "SQL That Actually Matters"
    tier: "🟢 Core"
    duration: "75 min"
    source_chapters: [24]
    ticketpulse: "TicketPulse can now answer business questions: top-selling events, revenue by venue, weekly trends."
    summary: "Write production-grade SQL using JOINs, CTEs, window functions, and aggregations to power TicketPulse's reporting."
    exercises:
      - type: "🛠️ Build"
        description: "Write the 'top 10 selling events this week' query using JOINs and GROUP BY with aggregate functions."
      - type: "🛠️ Build"
        description: "Use a CTE to calculate running totals of ticket sales per event. Use a window function (ROW_NUMBER, RANK) to rank events by revenue."
      - type: "🔍 Explore"
        description: "Write a query that shows each venue's percentage of total revenue using window functions (SUM OVER)."
    runs_locally: true
    prereqs: [L1-M05]

  - id: L1-M07
    title: "Indexing & Query Performance"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [24]
    ticketpulse: "TicketPulse queries are now fast — hot paths have proper indexes and you can prove it with EXPLAIN ANALYZE."
    summary: "Add indexes to TicketPulse's database and measure the before/after impact using EXPLAIN ANALYZE."
    exercises:
      - type: "🔍 Explore"
        description: "Run EXPLAIN ANALYZE on the 'find events by date range' query before adding any indexes. Record the execution time and plan."
      - type: "🛠️ Build"
        description: "Add B-tree indexes on frequently queried columns (event date, venue ID, ticket status). Add a composite index for common multi-column queries."
      - type: "📊 Observe"
        description: "Re-run EXPLAIN ANALYZE on the same queries. Compare execution time, note the switch from Seq Scan to Index Scan, and document the improvement."
    runs_locally: true
    prereqs: [L1-M06]

  - id: L1-M08
    title: "Data Modeling Decisions"
    tier: "🟡 Deep Dive"
    duration: "60 min"
    source_chapters: [2]
    ticketpulse: "You've evaluated TicketPulse's data model trade-offs and made intentional normalization decisions."
    summary: "Analyze normalization vs denormalization trade-offs for TicketPulse and make deliberate data modeling choices."
    exercises:
      - type: "🤔 Reflect"
        description: "Should venue address be embedded in the events table or kept in a separate venues table? Write out the pros and cons of each approach for TicketPulse's read and write patterns."
      - type: "📐 Design"
        description: "Design an optimized schema for the ticket purchase flow. Consider: do we store computed fields like total_revenue on events, or always compute them? Document your decision and reasoning."
      - type: "🔍 Explore"
        description: "Look at a real-world ticketing schema (Eventbrite's API docs or similar). Compare their modeling choices to yours."
    runs_locally: true
    prereqs: [L1-M05]

  - id: L1-M09
    title: "NoSQL: When and Why"
    tier: "🟡 Deep Dive"
    duration: "60 min"
    source_chapters: [2]
    ticketpulse: "TicketPulse now uses Redis for session storage and you understand when to reach for NoSQL vs relational."
    summary: "Explore Redis and DynamoDB, add Redis-based session storage to TicketPulse, and understand when NoSQL fits."
    exercises:
      - type: "🔍 Explore"
        description: "Connect to Redis CLI. Practice SET, GET, HSET, HGET, EXPIRE, TTL. Understand the data model differences from Postgres."
      - type: "🚀 Deploy"
        description: "Add Redis to TicketPulse's docker-compose.yml. Configure the app to store user sessions in Redis instead of in-memory."
      - type: "🤔 Reflect"
        description: "For each TicketPulse data type (events, tickets, sessions, analytics), evaluate: would this be better in Postgres, Redis, or DynamoDB? Why?"
    runs_locally: true
    prereqs: [L1-M05]

  - id: L1-M10
    title: "Caching Strategies"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [2]
    ticketpulse: "TicketPulse's hot queries (event listings, venue info) are now cached in Redis, dramatically reducing database load."
    summary: "Implement cache-aside pattern for TicketPulse's event listings using Redis and measure cache hit ratios."
    exercises:
      - type: "🛠️ Build"
        description: "Implement cache-aside for the GET /events endpoint: check Redis first, on miss query Postgres and populate cache with a TTL."
      - type: "🐛 Debug"
        description: "Introduce a cache invalidation bug (update an event but forget to invalidate cache). Observe stale data. Fix it with proper invalidation on write."
      - type: "📊 Observe"
        description: "Add logging to track cache hits vs misses. Run a load test and observe the hit ratio climbing. Measure response time improvement."
    runs_locally: true
    prereqs: [L1-M09]

  # ---------------------------------------------------------------------------
  # Section 1C: Building the API (Modules 11-16)
  # ---------------------------------------------------------------------------

  - id: L1-M11
    title: "REST API Design"
    tier: "🟢 Core"
    duration: "75 min"
    source_chapters: [25]
    ticketpulse: "TicketPulse has a clean REST API with 5 core endpoints for events, tickets, and orders — tested and documented."
    summary: "Design and implement TicketPulse's REST API with proper resource naming, HTTP methods, status codes, and pagination."
    exercises:
      - type: "📐 Design"
        description: "Design the TicketPulse API contract: list events, get event details, create order, get order, list tickets for event. Define URLs, methods, request/response shapes."
      - type: "🛠️ Build"
        description: "Implement the 5 endpoints. Use proper HTTP status codes (200, 201, 400, 404, 500). Add pagination to list endpoints."
      - type: "🔍 Explore"
        description: "Test every endpoint with curl or httpie. Verify correct status codes, response headers (Content-Type, Location for 201), and error responses."
    runs_locally: true
    prereqs: [L1-M05]

  - id: L1-M12
    title: "Error Handling That Doesn't Suck"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [25]
    ticketpulse: "TicketPulse returns consistent, structured error responses with error codes, messages, and request tracing."
    summary: "Implement consistent error handling middleware with structured error codes, validation errors, and proper HTTP semantics."
    exercises:
      - type: "🛠️ Build"
        description: "Create error middleware that catches all exceptions and returns a consistent JSON shape: {error: {code, message, details, requestId}}."
      - type: "🛠️ Build"
        description: "Add input validation to the create-order endpoint. Return 400 with field-level error details when validation fails."
      - type: "🐛 Debug"
        description: "The starter code has an endpoint that leaks a stack trace to the client. Find it and fix it so internal errors return a safe message."
    runs_locally: true
    prereqs: [L1-M11]

  - id: L1-M13
    title: "Authentication & Authorization"
    tier: "🟢 Core"
    duration: "75 min"
    source_chapters: [5]
    ticketpulse: "TicketPulse has JWT-based auth with signup, login, protected routes, and role-based access (user vs admin)."
    summary: "Add JWT authentication and role-based authorization to TicketPulse with signup, login, and protected routes."
    exercises:
      - type: "🛠️ Build"
        description: "Implement POST /auth/signup and POST /auth/login endpoints that issue JWTs. Hash passwords with bcrypt."
      - type: "🛠️ Build"
        description: "Create auth middleware that validates JWTs on protected routes. Add role-based checks: only admins can create events, any authenticated user can purchase tickets."
      - type: "🐛 Debug"
        description: "Test edge cases: expired token, tampered token, missing token, invalid role. Verify each returns the correct error response."
    runs_locally: true
    prereqs: [L1-M11]

  - id: L1-M14
    title: "Your First Deployment"
    tier: "🟢 Core"
    duration: "75 min"
    source_chapters: [7, 12]
    ticketpulse: "TicketPulse is containerized with a multi-stage Dockerfile and runs as a full stack via docker compose (app + Postgres + Redis)."
    summary: "Containerize TicketPulse with a multi-stage Dockerfile and orchestrate the full stack with docker compose."
    exercises:
      - type: "🛠️ Build"
        description: "Write a multi-stage Dockerfile: stage 1 installs dependencies and builds, stage 2 copies only the production artifacts into a slim image."
      - type: "🚀 Deploy"
        description: "Update docker-compose.yml with app, postgres, and redis services. Configure health checks, volume mounts for data persistence, and environment variables."
      - type: "🔍 Explore"
        description: "Run docker image ls and compare your multi-stage image size to a naive single-stage build. Inspect layers with docker history."
    runs_locally: true
    prereqs: [L1-M01]

  - id: L1-M15
    title: "CI/CD Pipeline"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [7, 15]
    ticketpulse: "Every push to TicketPulse's repo triggers an automated pipeline: lint, test, build, and deploy."
    summary: "Set up a GitHub Actions CI/CD pipeline for TicketPulse with lint, test, build, and deploy stages."
    exercises:
      - type: "🛠️ Build"
        description: "Create .github/workflows/ci.yml with four jobs: lint (eslint/prettier), test (run test suite), build (docker build), deploy (placeholder for now)."
      - type: "🚀 Deploy"
        description: "Push a commit that fails linting. Watch the pipeline fail. Fix the lint error, push again, watch it pass."
      - type: "🤔 Reflect"
        description: "Should the deploy step run on every push, or only on merges to main? Configure branch protection rules accordingly."
    runs_locally: true
    prereqs: [L1-M14]

  - id: L1-M16
    title: "Testing Fundamentals"
    tier: "🟢 Core"
    duration: "75 min"
    source_chapters: [8]
    ticketpulse: "TicketPulse has a test suite covering unit tests for business logic and integration tests for the ticket purchase flow."
    summary: "Add unit tests and integration tests to TicketPulse, including a full end-to-end test of the ticket purchase flow using testcontainers."
    exercises:
      - type: "🛠️ Build"
        description: "Write unit tests for the ticket pricing logic (discounts, fees, tax calculation). Mock the database layer."
      - type: "🛠️ Build"
        description: "Write an integration test for the full purchase flow: create event, list events, purchase ticket, verify order. Use testcontainers to spin up a real Postgres."
      - type: "🤔 Reflect"
        description: "Categorize each test you wrote: is it a unit test, integration test, or end-to-end test? Draw the testing pyramid for TicketPulse."
    runs_locally: true
    prereqs: [L1-M11]

  # ---------------------------------------------------------------------------
  # Section 1C+: Software Engineering Principles (Modules 16a-16d)
  # ---------------------------------------------------------------------------
  # These modules draw from Ch 32 and establish the code-level principles
  # that make everything else in the course work better.

  - id: L1-M16a
    title: "SOLID Principles in Practice"
    tier: "🟢 Core"
    duration: "75 min"
    source_chapters: [32]
    ticketpulse: "Refactor TicketPulse code to follow SOLID — extract responsibilities from the monolithic OrderService"
    summary: "Learn each SOLID principle by finding violations in TicketPulse and refactoring them"
    exercises:
      - type: "🐛 Debug"
        description: "Find 5 SOLID violations in the TicketPulse codebase (they're planted intentionally)"
      - type: "🛠️ Build"
        description: "Refactor OrderService into separate services following SRP, apply DI to decouple from Postgres"
      - type: "🤔 Reflect"
        description: "Before reading on: which SOLID principle do you think is most important for a growing codebase? Why?"
    runs_locally: true
    prereqs: [L1-M16]

  - id: L1-M16b
    title: "Clean Code & Design Principles"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [32]
    ticketpulse: "Apply naming, function design, and error handling principles to TicketPulse"
    summary: "Transform messy TicketPulse code into clean code using DRY, KISS, YAGNI, and clean code essentials"
    exercises:
      - type: "🛠️ Build"
        description: "Rename 10 poorly-named variables/functions in TicketPulse to reveal intent"
      - type: "🐛 Debug"
        description: "Find code smells: a 200-line function, primitive obsession, feature envy — refactor each"
      - type: "💡 Insight"
        description: "Read Sandi Metz's 'The Wrong Abstraction' blog post. Find an over-abstraction in the codebase."
    runs_locally: true
    prereqs: [L1-M16a]

  - id: L1-M16c
    title: "Design Patterns That Matter"
    tier: "🟡 Deep Dive"
    duration: "75 min"
    source_chapters: [32]
    ticketpulse: "Implement Strategy (pricing), Observer (events), and Repository patterns in TicketPulse"
    summary: "Apply the 5 most useful design patterns to real TicketPulse features"
    exercises:
      - type: "🛠️ Build"
        description: "Implement Strategy pattern for ticket pricing (flat, tiered, early-bird, VIP)"
      - type: "🛠️ Build"
        description: "Implement Observer/event emitter for domain events (TicketPurchased triggers email, analytics, inventory)"
      - type: "📐 Design"
        description: "Design: where would you use Decorator pattern in TicketPulse? Draw the before/after."
    runs_locally: true
    prereqs: [L1-M16b]

  - id: L1-M16d
    title: "Coupling, Cohesion & Modularity"
    tier: "🟡 Deep Dive"
    duration: "60 min"
    source_chapters: [32, 3]
    ticketpulse: "Analyze TicketPulse's coupling, draw a dependency graph, and reduce inappropriate coupling"
    summary: "Measure and improve TicketPulse's modularity using coupling/cohesion analysis"
    exercises:
      - type: "🔍 Explore"
        description: "Run dependency-cruiser on TicketPulse, visualize the dependency graph, identify cycles"
      - type: "📐 Design"
        description: "Draw the ideal module boundaries for TicketPulse. Compare with current state."
      - type: "🤔 Reflect"
        description: "Where would you draw the line between 'acceptable coupling' and 'too coupled' in TicketPulse?"
    runs_locally: true
    prereqs: [L1-M16b]

  # ---------------------------------------------------------------------------
  # Section 1D: Architecture Fundamentals (Modules 17-22)
  # ---------------------------------------------------------------------------

  - id: L1-M17
    title: "How Distributed Systems Fail"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [1]
    ticketpulse: "You've seen TicketPulse break under failure conditions and understand CAP theorem through lived experience."
    summary: "Experience CAP theorem firsthand by injecting failures into TicketPulse and observing how the system behaves when the database is slow or Redis is down."
    exercises:
      - type: "🐛 Debug"
        description: "Add artificial latency to the Postgres connection (use toxiproxy or a sleep in middleware). Observe what happens to API response times and user experience."
      - type: "🐛 Debug"
        description: "Kill the Redis container while TicketPulse is running. Does the app crash? Degrade? Return errors? Document what you observe."
      - type: "🤔 Reflect"
        description: "For TicketPulse ticket purchases, which matters more: consistency (never sell more tickets than available) or availability (always accept requests)? Write your reasoning."
    runs_locally: true
    prereqs: [L1-M10]

  - id: L1-M18
    title: "Consistency Models in Practice"
    tier: "🟡 Deep Dive"
    duration: "60 min"
    source_chapters: [1]
    ticketpulse: "You've observed eventual consistency in action — writes to the primary take time to appear on replicas."
    summary: "Demonstrate eventual consistency with TicketPulse by writing to a Postgres primary and reading from a replica, observing replication lag."
    exercises:
      - type: "🔍 Explore"
        description: "Set up a Postgres primary-replica configuration in docker compose. Write a ticket purchase to the primary, immediately read from the replica. Observe the lag."
      - type: "🐛 Debug"
        description: "Simulate a scenario where a user buys a ticket (writes to primary) but then sees the ticket as still available (reads from stale replica). How would you fix this?"
      - type: "🤔 Reflect"
        description: "Map TicketPulse's operations to consistency requirements: which reads MUST hit the primary? Which can tolerate staleness? Document the trade-offs."
    runs_locally: true
    prereqs: [L1-M17]

  - id: L1-M19
    title: "Architecture Patterns Overview"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [3]
    ticketpulse: "You can place TicketPulse on the architecture spectrum and articulate why it's currently a monolith and where it should go next."
    summary: "Tour the architecture spectrum from monolith to serverless and evaluate where TicketPulse sits today and where it should evolve."
    exercises:
      - type: "🔍 Explore"
        description: "Read about four architecture patterns: monolith, modular monolith, microservices, serverless. For each, list one real company that uses it and why."
      - type: "🤔 Reflect"
        description: "Where is TicketPulse on this spectrum right now? What are the pain points you've already felt? What would trigger a move to the next pattern?"
      - type: "📐 Design"
        description: "Sketch what TicketPulse would look like as a modular monolith: identify 3-4 modules, define their boundaries, and show how they communicate internally."
    runs_locally: true
    prereqs: [L1-M14]

  - id: L1-M20
    title: "Domain-Driven Design Basics"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [3]
    ticketpulse: "TicketPulse has clearly identified bounded contexts: Events, Ticketing, Payments, and Users — each with defined responsibilities."
    summary: "Identify bounded contexts in TicketPulse using DDD principles and draw the context map showing how domains interact."
    exercises:
      - type: "📐 Design"
        description: "Identify TicketPulse's bounded contexts (Events, Ticketing, Payments, Users). For each, list the entities, value objects, and key operations."
      - type: "📐 Design"
        description: "Draw a context map: how do these contexts communicate? Which relationships are customer-supplier? Which are shared kernel? Which are anti-corruption layer?"
      - type: "🤔 Reflect"
        description: "Look at the current TicketPulse codebase. Where do bounded context boundaries get violated? Find a place where payment logic leaks into the events module."
    runs_locally: true
    prereqs: [L1-M19]

  - id: L1-M21
    title: "Event-Driven Thinking"
    tier: "🟢 Core"
    duration: "60 min"
    source_chapters: [3]
    ticketpulse: "You've identified which TicketPulse operations should be synchronous (ticket reservation) vs asynchronous (email notifications, analytics)."
    summary: "Introduce domain events to TicketPulse and decide which operations should be synchronous vs asynchronous."
    exercises:
      - type: "📐 Design"
        description: "List all meaningful events in TicketPulse: EventCreated, TicketPurchased, OrderRefunded, UserRegistered, etc. Define the payload for each."
      - type: "🤔 Reflect"
        description: "For each event, decide: should downstream processing be synchronous (in the same request) or asynchronous (via a queue)? Justify each decision."
      - type: "🛠️ Build"
        description: "Implement a simple in-process event bus in the monolith. When a ticket is purchased, emit TicketPurchased. Have a listener that logs the event."
    runs_locally: true
    prereqs: [L1-M20]

  - id: L1-M22
    title: "Introduction to Message Queues"
    tier: "🟢 Core"
    duration: "75 min"
    source_chapters: [13]
    ticketpulse: "TicketPulse now publishes purchase events to a message queue and a consumer processes them asynchronously to send email notifications."
    summary: "Add a message queue to TicketPulse for async email notifications on ticket purchase using RabbitMQ or Redis Streams."
    exercises:
      - type: "🚀 Deploy"
        description: "Add RabbitMQ (or Redis Streams) to docker-compose.yml. Verify the management UI is accessible."
      - type: "🛠️ Build"
